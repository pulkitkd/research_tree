<style>:root {
  --paper: #faf6ee;
  --paper-2: #f3ede0;
  --ink: #2a2119;
  --ink-soft: #5b4c3e;
  --ink-faint: #a39584;
  --rust: #b5462a;
  --rust-soft: #d47a5c;
  --ongoing: #3a6aa8;
  --blocked: #b53a3a;
  --clarify: #c98a1a;
  --done: #3f7a3f;
  --abandoned: #9a8f82;

  --hand: 'Kalam', 'Caveat', cursive;
  --hand-tight: 'Caveat', 'Kalam', cursive;
  --mono: 'JetBrains Mono', ui-monospace, monospace;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  background: var(--paper);
  color: var(--ink);
  font-family: var(--hand);
  font-size: 17px;
  overflow: hidden;
}

/* dot-grid paper background */
body {
  background-image:
    radial-gradient(circle, #d8cfbf 1px, transparent 1.2px);
  background-size: 22px 22px;
  background-position: 0 0;
}

#root { height: 100%; }

/* ================ top bar ================ */
.topbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 30;
  display: flex;
  align-items: center;
  gap: 18px;
  padding: 10px 22px 8px;
  background: linear-gradient(to bottom, rgba(250,246,238,0.96), rgba(250,246,238,0.88));
  border-bottom: 1.5px solid var(--ink);
  border-bottom-style: dashed;
}
.topbar .title {
  font-family: var(--hand-tight);
  font-size: 30px;
  font-weight: 700;
  color: var(--ink);
  letter-spacing: 0.5px;
}
.topbar .title .accent { color: var(--rust); }
.topbar .subtitle {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink-soft);
  margin-left: -8px;
}

/* ================ stage ================ */
.stage {
  position: absolute;
  top: 54px; bottom: 0; left: 0; right: 0;
  overflow: hidden;
}

.legend {
  position: absolute;
  left: 18px;
  bottom: 14px;
  display: flex;
  gap: 14px;
  align-items: center;
  padding: 8px 14px;
  background: rgba(250,246,238,0.9);
  border: 1.2px solid var(--ink);
  border-radius: 18px 24px 16px 22px;
  font-family: var(--hand);
  font-size: 14px;
  z-index: 5;
}
.legend-item { display: inline-flex; align-items: center; gap: 6px; }
.legend-dot {
  width: 12px; height: 12px;
  border-radius: 50%;
  border: 1.5px solid var(--ink);
}
.ld-ongoing { background: var(--ongoing); }
.ld-blocked { background: var(--blocked); }
.ld-clarify { background: var(--clarify); }
.ld-done    { background: var(--done); }
.ld-abandoned { background: var(--abandoned); opacity: 0.5; border-style: dashed; }

/* ================ node ================ */
.node-circle {
  fill: var(--paper);
  stroke: var(--ink);
  stroke-width: 1.8;
  cursor: grab;
  transition: transform .12s;
}
.node-circle.ongoing   { fill: #c8dcf3; }
.node-circle.blocked   { fill: #f1c8c8; }
.node-circle.clarify   { fill: #f3dfb3; }
.node-circle.done      { fill: #cfe3cf; }
.node-circle.abandoned { fill: var(--paper); stroke-dasharray: 4 3; opacity: 0.45; }

.node-core {
  stroke-width: 2.4;
  fill: none;
}
.node-core.ongoing   { stroke: var(--ongoing); }
.node-core.blocked   { stroke: var(--blocked); }
.node-core.clarify   { stroke: var(--clarify); }
.node-core.done      { stroke: var(--done); }
.node-core.abandoned { stroke: var(--abandoned); stroke-dasharray: 3 3; }

/* Filled pie wedge that replaces .node-core when a node has checkbox todos.
   Fraction of node filled = fraction of todos completed (or a small
   fixed nudge slice if there are todos but none are done yet). */
.node-pie { stroke: none; pointer-events: none; }
.node-pie.ongoing   { fill: var(--ongoing); }
.node-pie.blocked   { fill: var(--blocked); }
.node-pie.clarify   { fill: var(--clarify); }
.node-pie.done      { fill: var(--done); }
.node-pie.abandoned { fill: var(--abandoned); opacity: 0.55; }

.node-label {
  font-family: var(--hand);
  font-size: 19px;
  fill: var(--ink);
  paint-order: stroke;
  stroke: var(--paper);
  stroke-width: 3px;
  stroke-linejoin: round;
  pointer-events: none;
  user-select: none;
}
.node-label.abandoned { opacity: 0.5; text-decoration: line-through; }

.edge {
  stroke: var(--ink);
  stroke-width: 1.6;
  fill: none;
  stroke-linecap: round;
}
.edge.abandoned { opacity: 0.35; stroke-dasharray: 4 3; }
.edge-arrow {
  fill: var(--ink);
  stroke: none;
  pointer-events: none;
}
.edge-arrow.abandoned { opacity: 0.35; }

/* selection ring — a translucent rust fill behind the node, reads like a
   soft highlight/glow. Solid fill is the persistent "selected" state; the
   dashed-rust outline ring (rendered inline in V4Canvas) is reserved for
   ephemeral mid-gesture states: Ctrl+click first-pick and add-drag hover. */
.sel-ring {
  fill: var(--rust);
  stroke: none;
  opacity: 0.25;
}

/* ghost node while dragging new */
.ghost-node {
  fill: var(--paper-2);
  stroke: var(--rust);
  stroke-width: 1.5;
  stroke-dasharray: 4 3;
  opacity: 0.8;
}

/* add handle (+) — hidden until the node is hovered, then fades in.
   Delay on fade-out keeps the handle reachable when you move off the ellipse
   toward it (there's a small gap at the top-right corner of the node).
   `visibility` (not `pointer-events`) gates clickability because transitions
   on `pointer-events` aren't reliable across browsers; `visibility` is. */
.add-handle-g {
  opacity: 0;
  visibility: hidden;
  transition: opacity .3s ease 1.2s, visibility 0s linear 1.5s;
}
g.node-g:hover .add-handle-g {
  opacity: 1;
  visibility: visible;
  transition: opacity .12s ease 0s, visibility 0s linear 0s;
}
.add-handle {
  fill: var(--paper);
  stroke: var(--rust);
  stroke-width: 1.5;
  cursor: crosshair;
}
.add-handle-plus {
  stroke: var(--rust);
  stroke-width: 1.8;
  pointer-events: none;
}

/* ================ detail panels ================ */

.field { margin: 10px 0; }
.field label {
  display: block;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink-soft);
  margin-bottom: 3px;
}
.field input, .field textarea, .field select {
  width: 100%;
  background: transparent;
  border: none;
  border-bottom: 1.5px dashed var(--ink-faint);
  font-family: var(--hand);
  font-size: 16px;
  color: var(--ink);
  padding: 3px 2px;
  resize: vertical;
}
.field textarea { min-height: 280px; border: 1.5px dashed var(--ink-faint); border-radius: 6px; padding: 6px; }
.field input:focus, .field textarea:focus, .field select:focus {
  outline: none;
  border-color: var(--rust);
}

.status-picker {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.status-chip {
  font-family: var(--hand);
  font-size: 13px;
  padding: 3px 10px;
  border: 1.5px solid var(--ink);
  border-radius: 12px 18px 12px 16px;
  background: var(--paper);
  color: var(--ink);
  cursor: pointer;
}
.status-chip .dot {
  display: inline-block;
  width: 8px; height: 8px;
  border-radius: 50%;
  margin-right: 5px;
  vertical-align: middle;
}
.status-chip.active.ongoing   { background: var(--ongoing); color: white; border-color: var(--ongoing); }
.status-chip.active.blocked   { background: var(--blocked); color: white; border-color: var(--blocked); }
.status-chip.active.clarify   { background: var(--clarify); color: white; border-color: var(--clarify); }
.status-chip.active.done      { background: var(--done); color: white; border-color: var(--done); }
.status-chip.active.abandoned { background: var(--abandoned); color: white; border-color: var(--abandoned); }

.panel-actions {
  display: flex;
  gap: 8px;
  margin-top: 14px;
  padding-top: 12px;
  border-top: 1.5px dashed var(--ink-faint);
}
.btn {
  font-family: var(--hand);
  font-size: 15px;
  padding: 5px 14px;
  background: var(--paper);
  border: 1.5px solid var(--ink);
  border-radius: 12px 18px 14px 16px;
  cursor: pointer;
  color: var(--ink);
}
.btn:hover { background: var(--paper-2); }
.btn.danger { color: var(--blocked); border-color: var(--blocked); }
.btn.primary { background: var(--ink); color: var(--paper); }
.btn.ghost {
  background: transparent;
  border-color: var(--ink-faint);
  color: var(--ink-soft);
  padding: 4px 10px;
  font-size: 13px;
}
.btn.ghost:hover:not(:disabled) { background: var(--paper-2); color: var(--ink); border-color: var(--ink); }
.btn.ghost:disabled { opacity: 0.35; cursor: not-allowed; }

.undo-dock {
  position: absolute;
  top: 84px;
  right: 20px;
  display: flex;
  gap: 6px;
  z-index: 15;
}

/* batch-action toolbar — appears at top-center when 2+ nodes are selected.
   Status chips apply to every selected node; delete wipes them all in one
   undoable step. */
.batch-toolbar {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 6px;
  align-items: center;
  padding: 6px 12px;
  background: rgba(250, 246, 238, 0.96);
  border: 1.5px solid var(--ink);
  border-radius: 14px 22px 14px 20px;
  box-shadow: 3px 4px 0 rgba(42,33,25,0.1);
  z-index: 20;
  font-family: var(--hand);
  font-size: 14px;
}
.batch-toolbar .batch-label {
  color: var(--ink-soft);
  font-size: 13px;
  padding-right: 8px;
  margin-right: 4px;
  border-right: 1px dashed var(--ink-faint);
}
.batch-toolbar .status-chip:hover { background: var(--paper-2); }
.batch-toolbar .btn.danger { padding: 3px 10px; font-size: 13px; }

/* detail dock — non-modal panel anchored to the bottom-right edge.
   Visible when exactly one node is selected AND the dock has been opened
   explicitly (double-click / Enter / `n`). Canvas stays interactive
   behind/around it. */
.dock {
  position: absolute;
  right: 20px;
  bottom: 20px;
  width: 380px;
  height: 60vh;
  max-height: calc(100vh - 100px);
  background: var(--paper);
  border: 2px solid var(--ink);
  border-radius: 14px 22px 14px 22px;
  padding: 18px 22px;
  box-shadow: 6px 7px 0 rgba(42,33,25,0.12);
  transform: rotate(-0.3deg);
  z-index: 30;
  overflow-y: auto;
}
.dock .xclose {
  position: absolute;
  top: 8px;
  right: 12px;
  background: transparent;
  border: none;
  font-size: 16px;
  color: var(--ink-soft);
  cursor: pointer;
  padding: 4px 6px;
}
.dock .xclose:hover { color: var(--rust); }
/* Tighter description textarea inside the dock so the whole form fits in
   60vh without forcing scroll on common viewports. */
.dock .field textarea { min-height: 200px; }

/* scrollbars */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-thumb { background: var(--ink-faint); border-radius: 5px; }
::-webkit-scrollbar-track { background: transparent; }

/* node hover state */
g.node-g { transition: transform .15s; }
g.node-g:hover .node-circle { filter: drop-shadow(1px 2px 0 rgba(42,33,25,0.15)); }

/* drag-preview edge */
.drag-edge {
  stroke: var(--rust);
  stroke-width: 1.6;
  stroke-dasharray: 5 4;
  fill: none;
}

/* marquee selection rect — dashed rust outline with a faint rust wash */
.marquee-rect {
  fill: var(--rust);
  fill-opacity: 0.08;
  stroke: var(--rust);
  stroke-width: 1.5;
  stroke-dasharray: 5 4;
  pointer-events: none;
}
</style>
